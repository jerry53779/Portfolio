<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 140" width="100%" height="100%" style="background-color: #111111; font-family: 'Poppins', 'Montserrat', sans-serif;">
  
  <!-- ========================================== -->
  <!-- DEFINITIONS & STYLES                       -->
  <!-- ========================================== -->
  <defs>
    <style>
      .neo-border { stroke: #111111; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .grid-line { stroke: #222222; stroke-width: 1; }
      .cage-ring { fill: none; stroke: #FFCC00; stroke-width: 2; stroke-linejoin: round; opacity: 0.8; }
      .text-light { fill: #E1E1E6; font-family: monospace; font-size: 10px; font-weight: 700; }
      .text-accent { fill: #FFCC00; font-weight: 900; }
      .node-circle { fill: #1A1A1A; stroke: #FFCC00; stroke-width: 1.5; }
    </style>
    
    <!-- Tactile Blueprint Matrix Grid -->
    <pattern id="combat-grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#2A2A2A" />
    </pattern>
  </defs>

  <!-- Background Layer with Combat Blueprint Texture -->
  <rect width="340" height="140" fill="#111111" />
  <rect width="340" height="140" fill="url(#combat-grid)" />

  <!-- ========================================== -->
  <!-- THE OCTAGON COMBAT CANVAS MAP (LEFT)      -->
  <!-- ========================================== -->
  <g transform="translate(15, 15)">
    <!-- Shield Backing shadow -->
    <rect x="4" y="4" width="110" height="105" fill="#000000" rx="4" />
    <!-- Canvas Frame Module -->
    <rect x="0" y="0" width="110" height="105" fill="#161616" class="neo-border" rx="4" />
    
    <!-- Wireframe Octagon Ring Vector Boundary Layout -->
    <g transform="translate(55, 52.5)">
      <!-- Outer Cage Wireframe -->
      <polygon points="0,-40 28,-28 40,0 28,28 0,40 -28,28 -40,0 -28,-28" class="cage-ring" />
      <polygon points="0,-30 21,-21 30,0 21,21 0,30 -21,21 -30,0 -21,-21" class="cage-ring" stroke-width="1" opacity="0.4" />
      
      <!-- Sequence Trajectory Vector Coordinates (Easter Egg #3 Core Component) -->
      <path d="M -15,10 L 0,-15 L 20,5" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3,2" />
      
      <!-- Strike Node Targets Mapping Sequences -->
      <circle cx="-15" cy="10" r="4" class="node-circle" />
      <circle cx="0" cy="-15" r="4" fill="#FFCC00" stroke="#111111" stroke-width="1.5" />
      <circle cx="20" cy="5" r="4" class="node-circle" />
    </g>
  </g>

  <!-- ========================================== -->
  <!-- TIMELINES CHOREOGRAPHY SEQUENCE ENGINE (RIGHT) -->
  <!-- ========================================== -->
  <g transform="translate(140, 15)">
    <!-- Panel Backing shadow -->
    <rect x="4" y="4" width="180" height="105" fill="#000000" rx="4" />
    <!-- Panel Container Frame Layout Area -->
    <rect x="0" y="0" width="180" height="105" fill="#1A1A1A" class="neo-border" rx="4" />
    
    <!-- Console Status Window Header -->
    <path d="M 0 3 A 3 3 0 0 1 3 0 L 177 0 A 3 3 0 0 1 180 3 L 180 18 L 0 18 Z" fill="#222222" stroke="#111111" stroke-width="2" />
    <circle cx="10" cy="9" r="3" fill="#FFCC00" />
    <text x="22" y="12" font-size="8px" font-weight="900" fill="#666666" letter-spacing="0.5">SEQUENCE_FLOW_GENERATOR</text>

    <!-- Sequence Combo Execution Parameter Nodes Feed -->
    <g transform="translate(12, 32)" class="text-light">
      <!-- Combo Line 1: Technical Strike Action -->
      <g transform="translate(0, 8)">
        <text x="0" y="4" class="text-accent">01_LEAD_JAB</text>
        <rect x="110" y="-5" width="55" height="12" rx="3" fill="#FFCC00" class="neo-border" stroke-width="1" />
        <text x="116" y="4" font-size="7.5px" font-weight="900" fill="#111111">FRAME: 04</text>
      </g>
      
      <!-- Combo Line 2: Fluid Combo Chain Link -->
      <g transform="translate(0, 24)">
        <text x="0" y="4">02_REAR_CROSS</text>
        <rect x="110" y="-5" width="55" height="12" rx="3" fill="#FFFFFF" class="neo-border" stroke-width="1" />
        <text x="116" y="4" font-size="7.5px" font-weight="900" fill="#111111">FRAME: 08</text>
      </g>

      <!-- Combo Line 3: Intercept Active Movement Execution -->
      <g transform="translate(0, 40)">
        <text x="0" y="4" fill="#00FF00">03_SPIN_HOOK_KICK</text>
        <rect x="110" y="-5" width="55" height="12" rx="3" fill="#111111" class="neo-border" stroke-width="1" />
        <text x="116" y="4" font-size="7.5px" font-weight="900" fill="#00FF00">CRIT_HIT</text>
      </g>

      <!-- Mechanical Dynamic Blink Command Bar Terminal (Easter Egg #24 Script Connection Node) -->
      <g transform="translate(0, 56)">
        <text x="0" y="4" fill="#555555">&gt;&gt; compiling strike_matrix_</text>
        <rect x="142" y="-4" width="4" height="9" fill="#555555">
          <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>
  </g>
  
</svg>
