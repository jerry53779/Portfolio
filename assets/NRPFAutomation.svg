<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 140" width="100%" height="100%" style="background-color: #0B141A; font-family: 'Poppins', 'Segoe UI', sans-serif;">
  
  <defs>
    <style>
      .neo-border { stroke: #111111; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .phone-frame { fill: #0B141A; stroke: #222222; stroke-width: 3; }
      .wa-green { fill: #00A884; }
      .wa-bubble-in { fill: #202C33; }
      .wa-bubble-out { fill: #005C4B; }
      .text-meta { fill: #667781; font-size: 8px; font-weight: 500; }
      .text-msg { fill: #E9EDEF; font-size: 9px; font-weight: 600; }
      .code-accent { fill: #FFCC00; font-family: monospace; font-weight: 700; }
    </style>
    
    <pattern id="automation-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.7" fill="#202C33" />
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#111B21" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="340" height="140" fill="#0B141A" />
  <rect width="340" height="140" fill="url(#automation-grid)" />

  <path d="M 10 30 L 70 30 L 95 55" fill="none" stroke="#202C33" stroke-width="2" />
  <path d="M 10 110 L 85 110 L 95 85" fill="none" stroke="#202C33" stroke-width="2" stroke-dasharray="4, 3" />
  <circle cx="70" cy="30" r="3" fill="#00A884" />
  <circle cx="85" cy="110" r="3" fill="#FFCC00" />

  <g transform="translate(95, 15)">
    <rect x="5" y="5" width="225" height="105" fill="#111111" rx="4" />
    <rect x="0" y="0" width="225" height="105" fill="#111B21" class="neo-border" rx="4" />
    
    <path d="M 0 3 A 3 3 0 0 1 3 0 L 222 0 A 3 3 0 0 1 225 3 L 225 24 L 0 24 Z" class="wa-green" />
    
    <circle cx="16" cy="12" r="6" fill="#FFFFFF" opacity="0.9" />
    <path d="M 13 12 L 15 14 L 19 10" fill="none" stroke="#00A884" stroke-width="2" stroke-linecap="round"/>
    <text x="28" y="15" font-size="9px" font-weight="800" fill="#FFFFFF" letter-spacing="0.3">NRPF_Automation_Engine</text>
    
    <rect x="175" y="6" width="42" height="12" rx="3" fill="#111111" opacity="0.4" />
    <text x="180" y="15" font-size="7px" font-weight="900" fill="#00FF00" letter-spacing="0.5">DRVR: OK</text>

    <g transform="translate(10, 32)">
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="145" height="20" rx="4" class="wa-bubble-in neo-border" stroke-width="1" />
        <text x="8" y="12" class="text-msg">[SYS_EVENT]: Triggering dispatch...</text>
        <text x="122" y="17" class="text-meta">07:05</text>
      </g>
      
      <g transform="translate(50, 26)">
        <rect x="1" y="1" width="155" height="32" rx="4" fill="#111111" opacity="0.3" />
        <rect x="0" y="0" width="155" height="32" rx="4" class="wa-bubble-out neo-border" stroke-width="1.5" />
        <text x="8" y="12" class="text-msg" font-weight="800" fill="#FFCC00">🚀 Community Alert Routed</text>
        <text x="8" y="24" class="text-msg" font-size="8px" opacity="0.9">Payload queue status: SUCCESS</text>
        <text x="132" y="28" class="text-meta" fill="#A2C7C0">07:05</text>
        
        <path d="M 146 24 L 149 27 L 153 21 M 149 24 L 152 27 L 156 21" fill="none" stroke="#53BDEB" stroke-width="1.2" stroke-linecap="round"/>
      </g>
    </g>

    <path d="M 0 93 L 225 93" stroke="#202C33" stroke-width="1" />
    <text x="8" y="102" font-size="7.5px" class="code-accent">&gt;&gt; Headless browser payload tracking: dispatched loop [INF]</text>
  </g>
  
</svg>
